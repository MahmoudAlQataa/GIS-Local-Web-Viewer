<!DOCTYPE html>
<html lang="ar" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Local Web Viewer</title>
    <link rel="stylesheet" href="/assets/leaflet/leaflet.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <header class="topbar">
        <div class="brand">
            <span class="brand-mark">GIS</span>
            <span class="brand-name">Local Web Viewer</span>
        </div>

        <div class="upload-control">
            <label for="file-input" class="upload-btn">
                Upload GeoJSON
                <input type="file" id="file-input" accept=".geojson,.json" hidden>
            </label>
            <span id="upload-status" class="upload-status"></span>
        </div>
    </header>

    <div class="workspace">

        <aside class="sidebar">
            <div class="panel">
                <h2 class="panel-title">Search</h2>
                <input type="text" id="search-general" class="search-input" placeholder="بحث عام في كل الطبقات…"
                    disabled>
                <div class="search-divider"></div>
                <input type="text" id="search-name" class="search-input" placeholder="بحث بالاسم (طبقات الأشخاص)…"
                    disabled>
                <input type="text" id="search-id" class="search-input" placeholder="بحث برقم الهوية (طبقات الأشخاص)…"
                    disabled>
                <input type="text" id="search-camp" class="search-input" placeholder="بحث باسم المخيم (طبقات الأشخاص)…"
                    disabled>
                <input type="text" id="search-family" class="search-input"
                    placeholder="بحث باسم العائلة (طبقات الأشخاص)…" disabled>
            </div>

            <div class="panel">
                <h2 class="panel-title">Layers</h2>
                <ul id="layers-list" class="layers-list">
                    <li class="empty-state">No layers loaded yet.</li>
                </ul>
            </div>

            <div class="panel">
                <h2 class="panel-title">Search Results</h2>
                <ul id="search-results" class="legend">
                    <li class="empty-state">اكتب للبحث…</li>
                </ul>
            </div>
        </aside>

        <main class="map-area">
            <div id="map"></div>

            <div class="coord-readout">
                <span class="coord-item"><b>LAT</b> <span id="coord-lat">—</span></span>
                <span class="coord-item"><b>LNG</b> <span id="coord-lng">—</span></span>
                <span class="coord-item"><b>ZOOM</b> <span id="coord-zoom">—</span></span>
            </div>
        </main>

        <aside id="query-panel" class="query-panel">
            <div class="query-panel-header">
                <span class="panel-title">بيانات الشخص</span>
                <button id="query-panel-close" class="query-panel-close">✕</button>
            </div>
            <div id="query-panel-body" class="query-panel-body"></div>
        </aside>

    </div>

    <script src="/assets/leaflet/leaflet.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
